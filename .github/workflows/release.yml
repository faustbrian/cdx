name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-release:
    name: Release Binary (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            file-pattern: 'ELF 64-bit.*x86-64'
          - platform: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            file-pattern: 'Mach-O 64-bit executable arm64'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: ${{ matrix.target }}

      - name: Validate release identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -1)"
          if [[ -z "${version}" ]]; then
            printf '%s\n' 'Cargo package version is missing' >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == tag && "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            printf 'release tag %s does not match Cargo version v%s\n' \
              "${GITHUB_REF_NAME}" "${version}" >&2
            exit 1
          fi
          printf 'version=%s\n' "${version}" >>"${GITHUB_OUTPUT}"

      - name: Verify publishable package contents
        run: ./scripts/audit-package.sh

      - name: Verify release archive script on this runner
        run: ./scripts/audit-release-archive.sh

      - name: Build locked release binary
        run: cargo build --release --locked --all-features --target ${{ matrix.target }}

      - name: Package and inspect binary
        id: package
        env:
          FILE_PATTERN: ${{ matrix.file-pattern }}
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.identity.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          package="cdx-${VERSION}-${TARGET}"
          archive="${package}.tar.gz"
          mkdir -p "dist/${package}"
          cp "target/${TARGET}/release/cdx" "dist/${package}/cdx"
          cp LICENSE.md README.md CHANGELOG.md "dist/${package}/"
          file "dist/${package}/cdx" | tee "dist/${package}.architecture.txt"
          grep -E "${FILE_PATTERN}" "dist/${package}.architecture.txt"
          tar -C dist -czf "dist/${archive}" "${package}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${archive}" >"dist/${archive}.sha256"
          else
            shasum -a 256 "dist/${archive}" >"dist/${archive}.sha256"
          fi
          {
            printf 'revision=%s\n' "${GITHUB_SHA}"
            printf 'platform=%s\n' "${PLATFORM}"
            printf 'target=%s\n' "${TARGET}"
            rustc --version --verbose
          } >"dist/${package}.build.txt"
          printf 'archive=dist/%s\n' "${archive}" >>"${GITHUB_OUTPUT}"
          printf 'package=%s\n' "${package}" >>"${GITHUB_OUTPUT}"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          file: ${{ steps.package.outputs.archive }}
          format: spdx-json
          output-file: dist/${{ steps.package.outputs.package }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        id: provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Attest SPDX SBOM
        id: sbom
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: ${{ steps.package.outputs.archive }}
          sbom-path: dist/${{ steps.package.outputs.package }}.spdx.json

      - name: Retain signed evidence bundles
        env:
          PACKAGE: ${{ steps.package.outputs.package }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          SBOM_BUNDLE: ${{ steps.sbom.outputs.bundle-path }}
        shell: bash
        run: |
          set -euo pipefail
          cp "${PROVENANCE_BUNDLE}" "dist/${PACKAGE}.provenance.sigstore.json"
          cp "${SBOM_BUNDLE}" "dist/${PACKAGE}.sbom.sigstore.json"
          rm -rf "dist/${PACKAGE}"

      - name: Publish architecture release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ matrix.platform }}
          path: dist
          if-no-files-found: error
          retention-days: 90

  verify-and-publish:
    name: Verify and publish release
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      attestations: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download architecture release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify checksums, attestations, and architecture set
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t archives < <(find dist -maxdepth 1 -type f -name '*.tar.gz' -print | sort)
          if (( ${#archives[@]} != 2 )); then
            printf 'expected 2 release archives, found %s\n' "${#archives[@]}" >&2
            exit 1
          fi
          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-apple-darwin; do
            if [[ "$(find dist -maxdepth 1 -name "*-${target}.tar.gz" | wc -l)" -ne 1 ]]; then
              printf 'release archive set does not contain exactly one %s target\n' \
                "${target}" >&2
              exit 1
            fi
          done
          for archive in "${archives[@]}"; do
            checksum="${archive}.sha256"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum --check "${checksum}"
            else
              shasum -a 256 --check "${checksum}"
            fi
            gh attestation verify "${archive}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_WORKFLOW_REF%%@*}" \
              --source-digest "${GITHUB_SHA}" \
              --predicate-type 'https://slsa.dev/provenance/v1'
            gh attestation verify "${archive}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_WORKFLOW_REF%%@*}" \
              --source-digest "${GITHUB_SHA}" \
              --predicate-type 'https://spdx.dev/Document/v2.3'
          done
          for checksum in dist/*.tar.gz.sha256; do
            sed 's#  dist/#  #' "${checksum}"
          done | sort -k2 >dist/SHA256SUMS
          if command -v sha256sum >/dev/null 2>&1; then
            (
              cd dist
              sha256sum --check SHA256SUMS
            )
          else
            (
              cd dist
              shasum -a 256 --check SHA256SUMS
            )
          fi

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/*.architecture.txt \
            dist/*.build.txt \
            dist/*.spdx.json \
            dist/*.sigstore.json \
            dist/SHA256SUMS \
            --generate-notes \
            --title "cdx ${GITHUB_REF_NAME}"

      - name: Publish verified release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: verified-release-evidence
          path: dist
          if-no-files-found: error
          retention-days: 90
